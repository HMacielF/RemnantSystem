<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        background: white;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        width: min(560px, calc(100vw - 32px));
      }
      form {
        display: grid;
        gap: 12px;
      }
      input, button {
        padding: 12px 14px;
        font-size: 16px;
        border-radius: 10px;
      }
      input {
        border: 1px solid #ccc;
      }
      button {
        border: none;
        background: #e78b4b;
        color: #fff;
        cursor: pointer;
      }
      a {
        color: #b85b1b;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Reset your password</h1>
      <p>Enter the email address tied to your account. We’ll send a secure link to finish the reset.</p>
      <form method="POST" action="/forgot-password">
        <input type="email" name="email" placeholder="Email" required />
        <button type="submit">Send reset link</button>
      </form>
      <p><a href="/portal">Back to login</a></p>
    </div>
  </body>
</html>
