<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remnant Inventory</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Manrope", "sans-serif"],
              display: ["Fraunces", "serif"],
            },
            boxShadow: {
              soft: "0 24px 70px rgba(44, 29, 18, 0.10)",
            },
          },
        },
      };
    </script>
    <script src="/main.js" defer></script>
  </head>
  <body class="min-h-screen bg-[linear-gradient(180deg,#f8f1ea_0%,#f4ede6_26%,#efe7de_100%)] text-[#2d2623] font-sans text-[15px]">
    <div class="relative overflow-hidden">
      <div class="absolute inset-x-0 top-0 h-[440px] bg-[radial-gradient(circle_at_top_left,rgba(231,139,75,0.22),transparent_36%),radial-gradient(circle_at_top_right,rgba(93,129,118,0.16),transparent_32%)] pointer-events-none"></div>
      <div class="absolute left-[-120px] top-[120px] h-[260px] w-[260px] rounded-full bg-[#e7c3a9]/20 blur-3xl pointer-events-none"></div>
      <div class="absolute right-[-60px] top-[40px] h-[220px] w-[220px] rounded-full bg-[#b7d1c6]/20 blur-3xl pointer-events-none"></div>

      <div class="relative mx-auto max-w-[1680px] px-4 py-4 md:px-6 md:py-5">
        <section class="mb-4 overflow-hidden rounded-[32px] border border-white/70 bg-[linear-gradient(135deg,rgba(255,250,246,0.96),rgba(248,240,233,0.88))] px-6 py-5 shadow-soft backdrop-blur">
          <div class="flex justify-center">
            <div class="mx-auto flex max-w-2xl flex-col items-center text-center">
              <p class="text-sm font-semibold uppercase tracking-[0.22em] text-[#9d6f4c] md:text-[15px]">
                Live Remnant Inventory
              </p>
              <h1 class="mt-2 whitespace-nowrap font-display text-3xl leading-tight text-[#2c211c] md:text-[2.65rem]">
                Find the right remnant before it gets sold.
              </h1>
            </div>
          </div>
        </section>

        <form
          id="filter-form"
          method="GET"
          class="mb-4 rounded-[30px] border border-white/70 bg-white/88 p-5 shadow-soft backdrop-blur"
        >
          <div class="grid gap-3 xl:grid-cols-[700px_minmax(180px,1fr)_110px_110px_140px] xl:items-end">
            <div class="min-w-0">
              <label class="mb-2 block text-xs font-semibold uppercase tracking-[0.18em] text-[#9c7355]">
                Material Types
              </label>
              <div
                id="material-checkboxes"
                class="flex h-12 items-center gap-1.5 whitespace-nowrap rounded-2xl border border-[#d8c7b8] bg-white px-2 text-sm text-[#2d2623] shadow-sm"
              ></div>
            </div>

            <label class="block min-w-0 text-xs font-semibold uppercase tracking-[0.18em] text-[#9c7355]">
              Stone / ID #
              <input
                type="text"
                name="stone"
                id="stone-filter"
                placeholder="Search by stone name or #741"
                class="mt-2 h-12 w-full rounded-2xl border border-[#d8c7b8] bg-white px-4 text-sm font-medium normal-case tracking-normal text-[#2d2623] placeholder:text-[#a5968a] shadow-sm outline-none transition focus:border-[#E78B4B] focus:ring-4 focus:ring-[#E78B4B]/10"
              />
            </label>

            <label class="block text-xs font-semibold uppercase tracking-[0.18em] text-[#9c7355]">
              Min Width
              <input
                type="number"
                name="min-width"
                id="min-width"
                placeholder="W"
                class="mt-2 h-12 w-full rounded-2xl border border-[#d8c7b8] bg-white px-3 text-sm font-medium normal-case tracking-normal text-[#2d2623] placeholder:text-[#a5968a] shadow-sm outline-none transition focus:border-[#E78B4B] focus:ring-4 focus:ring-[#E78B4B]/10"
              />
            </label>

            <label class="block text-xs font-semibold uppercase tracking-[0.18em] text-[#9c7355]">
              Min Height
              <input
                type="number"
                name="min-height"
                id="min-height"
                placeholder="H"
                class="mt-2 h-12 w-full rounded-2xl border border-[#d8c7b8] bg-white px-3 text-sm font-medium normal-case tracking-normal text-[#2d2623] placeholder:text-[#a5968a] shadow-sm outline-none transition focus:border-[#E78B4B] focus:ring-4 focus:ring-[#E78B4B]/10"
              />
            </label>

            <label class="block text-xs font-semibold uppercase tracking-[0.18em] text-[#9c7355]">
              Status
              <select
                name="status"
                id="status-filter"
                class="mt-2 h-12 w-full rounded-2xl border border-[#d8c7b8] bg-white px-3 text-sm font-medium normal-case tracking-normal text-[#2d2623] shadow-sm outline-none transition focus:border-[#E78B4B] focus:ring-4 focus:ring-[#E78B4B]/10"
              >
                <option value="">All</option>
                <option value="available">Available</option>
                <option value="hold">On Hold</option>
                <option value="sold">Sold</option>
              </select>
            </label>
          </div>
        </form>

        <section class="mb-3 flex flex-wrap items-center justify-between gap-3">
          <div>
            <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-[#9c7355]">Inventory Board</p>
            <h2 class="mt-1 text-2xl font-semibold text-[#2d2623]">Current remnants</h2>
          </div>
          <div id="status-summary" class="flex flex-wrap gap-2"></div>
        </section>

        <div
          id="remnants-container"
          class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5"
          aria-live="polite"
        >
          Loading...
        </div>
      </div>
    </div>

    <div
      id="image-lightbox"
      data-modal-overlay="image-lightbox"
      class="hidden fixed inset-0 z-[70] bg-black/75 px-4 py-6"
    >
      <div class="mx-auto flex h-full max-w-6xl flex-col">
        <div class="mb-4 flex justify-end">
          <button
            type="button"
            data-close-modal="image-lightbox"
            class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-white/20 bg-white/10 text-2xl text-white transition-colors hover:bg-white/20 active:bg-white/30"
            aria-label="Close image preview"
          >
            ×
          </button>
        </div>
        <div class="flex min-h-0 flex-1 items-center justify-center">
          <img
            id="lightbox-image"
            src=""
            alt="Remnant preview"
            class="max-h-full max-w-full rounded-[28px] border border-white/15 bg-white/5 object-contain shadow-[0_30px_80px_rgba(0,0,0,0.35)]"
          />
        </div>
      </div>
    </div>
  </body>
</html>
