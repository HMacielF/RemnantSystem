<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            boxShadow: {
              soft: "0 20px 50px rgba(73, 49, 31, 0.12)",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth/config.js"></script>
  </head>
  <body class="min-h-screen bg-[linear-gradient(180deg,#f8f2eb_0%,#efe4d9_100%)] text-[#2d2623]">
    <div class="pointer-events-none fixed inset-0 overflow-hidden">
      <div class="absolute left-[-120px] top-[-80px] h-[360px] w-[360px] rounded-full bg-[#f7dcc5]/70 blur-3xl"></div>
      <div class="absolute bottom-[-120px] right-[-80px] h-[360px] w-[360px] rounded-full bg-[#ead0bc]/70 blur-3xl"></div>
    </div>

    <main class="relative mx-auto flex min-h-screen w-full max-w-6xl items-center px-6 py-10 lg:px-10">
      <div class="grid w-full gap-8 lg:grid-cols-[1.02fr_0.98fr] lg:items-center">
        <section class="max-w-2xl">
          <p class="text-[11px] font-semibold uppercase tracking-[0.28em] text-[#9c7355]">Secure Access</p>
          <h1 class="mt-4 text-4xl font-semibold tracking-tight text-[#241c18] sm:text-5xl">
            Set your password and get back into the workspace.
          </h1>
          <p class="mt-5 max-w-xl text-base leading-7 text-[#6d584b] sm:text-lg">
            This secure page finishes your invite or password reset so you can return to live remnant
            management without waiting on manual setup.
          </p>
        </section>

        <section class="rounded-[34px] border border-white/75 bg-white/82 p-6 shadow-soft backdrop-blur sm:p-8">
          <div class="rounded-[26px] border border-[#f0e0d4] bg-[#fff9f4] p-5">
            <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-[#9c7355]">Password Setup</p>
            <h2 class="mt-3 text-3xl font-semibold text-[#241c18]">Choose a password</h2>
            <p id="status" class="mt-2 text-sm leading-6 text-[#6d584b]">Validating your secure link...</p>
          </div>

          <form id="password-form" hidden class="mt-6 space-y-4">
            <label class="block text-xs font-semibold uppercase tracking-[0.18em] text-[#9c7355]">
              New Password
              <input
                type="password"
                id="password"
                placeholder="At least 8 characters"
                minlength="8"
                required
                class="mt-2 h-12 w-full rounded-2xl border border-[#d8c7b8] bg-white px-4 text-sm font-medium normal-case tracking-normal text-[#2d2623] placeholder:text-[#a5968a] shadow-sm outline-none transition focus:border-[#E78B4B] focus:ring-4 focus:ring-[#E78B4B]/10"
              />
            </label>

            <label class="block text-xs font-semibold uppercase tracking-[0.18em] text-[#9c7355]">
              Confirm Password
              <input
                type="password"
                id="confirm-password"
                placeholder="Re-enter your password"
                minlength="8"
                required
                class="mt-2 h-12 w-full rounded-2xl border border-[#d8c7b8] bg-white px-4 text-sm font-medium normal-case tracking-normal text-[#2d2623] placeholder:text-[#a5968a] shadow-sm outline-none transition focus:border-[#E78B4B] focus:ring-4 focus:ring-[#E78B4B]/10"
              />
            </label>

            <button
              type="submit"
              class="inline-flex h-12 w-full items-center justify-center rounded-2xl bg-[#232323] px-6 text-sm font-semibold uppercase tracking-[0.16em] text-white shadow-lg shadow-[#232323]/15 transition-all hover:-translate-y-0.5 hover:bg-[#E78B4B] active:translate-y-0"
            >
              Save Password
            </button>
          </form>

          <div class="mt-5 text-sm">
            <a href="/portal" class="font-medium text-[#b85b1b] transition hover:text-[#8f4517]">
              Back to sign in
            </a>
          </div>
        </section>
      </div>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const form = document.getElementById("password-form");
      const passwordEl = document.getElementById("password");
      const confirmPasswordEl = document.getElementById("confirm-password");

      function setStatus(message, className = "") {
        statusEl.textContent = message;
        statusEl.className = "mt-2 text-sm leading-6";

        if (className === "error") {
          statusEl.classList.add("text-[#b42318]");
          return;
        }

        if (className === "success") {
          statusEl.classList.add("text-[#067647]");
          return;
        }

        statusEl.classList.add("text-[#6d584b]");
      }

      function readAuthParams() {
        const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
        const query = new URLSearchParams(window.location.search);
        return {
          access_token: hash.get("access_token") || query.get("access_token"),
          refresh_token: hash.get("refresh_token") || query.get("refresh_token"),
          type: hash.get("type") || query.get("type"),
        };
      }

      async function init() {
        const config = window.__SUPABASE_CONFIG__ || {};
        if (!config.url || !config.anonKey) {
          setStatus("Supabase client config is missing.", "error");
          return;
        }

        const params = readAuthParams();
        if (!params.access_token || !params.refresh_token) {
          setStatus("This invite or reset link is invalid or has already been used.", "error");
          return;
        }

        const supabase = window.supabase.createClient(config.url, config.anonKey);
        const { error } = await supabase.auth.setSession({
          access_token: params.access_token,
          refresh_token: params.refresh_token,
        });

        if (error) {
          setStatus(error.message || "Unable to validate this link.", "error");
          return;
        }

        form.hidden = false;
        if (params.type === "invite") {
          setStatus("Invite accepted. Choose a password to activate your account.");
        } else {
          setStatus("Choose a new password for your account.");
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          const password = passwordEl.value;
          const confirmPassword = confirmPasswordEl.value;

          if (password.length < 8) {
            setStatus("Password must be at least 8 characters.", "error");
            return;
          }

          if (password !== confirmPassword) {
            setStatus("Passwords do not match.", "error");
            return;
          }

          setStatus("Saving your password...");
          const { error: updateError } = await supabase.auth.updateUser({ password });

          if (updateError) {
            setStatus(updateError.message || "Unable to save password.", "error");
            return;
          }

          setStatus("Password saved. You can log in now.", "success");
          form.hidden = true;
          window.setTimeout(() => {
            window.location.href = "/portal";
          }, 1200);
        });
      }

      init();
    </script>
  </body>
</html>
