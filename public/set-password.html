<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Password</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: grid;
        place-items: center;
        min-height: 100vh;
        color: #222;
      }
      .card {
        background: white;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        width: min(560px, calc(100vw - 32px));
      }
      form {
        display: grid;
        gap: 12px;
      }
      input, button {
        padding: 12px 14px;
        font-size: 16px;
        border-radius: 10px;
      }
      input {
        border: 1px solid #ccc;
      }
      button {
        border: none;
        background: #e78b4b;
        color: #fff;
        cursor: pointer;
      }
      .status {
        margin-bottom: 16px;
        color: #666;
      }
      .error {
        color: #b42318;
      }
      .success {
        color: #067647;
      }
      a {
        color: #b85b1b;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth/config.js"></script>
  </head>
  <body>
    <div class="card">
      <h1>Set your password</h1>
      <p class="status" id="status">Validating your secure link...</p>
      <form id="password-form" hidden>
        <input type="password" id="password" placeholder="New password" minlength="8" required />
        <input type="password" id="confirm-password" placeholder="Confirm new password" minlength="8" required />
        <button type="submit">Save password</button>
      </form>
      <p><a href="/portal">Back to login</a></p>
    </div>
    <script>
      const statusEl = document.getElementById("status");
      const form = document.getElementById("password-form");
      const passwordEl = document.getElementById("password");
      const confirmPasswordEl = document.getElementById("confirm-password");

      function setStatus(message, className = "") {
        statusEl.textContent = message;
        statusEl.className = `status ${className}`.trim();
      }

      function readAuthParams() {
        const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
        const query = new URLSearchParams(window.location.search);
        return {
          access_token: hash.get("access_token") || query.get("access_token"),
          refresh_token: hash.get("refresh_token") || query.get("refresh_token"),
          type: hash.get("type") || query.get("type"),
        };
      }

      async function init() {
        const config = window.__SUPABASE_CONFIG__ || {};
        if (!config.url || !config.anonKey) {
          setStatus("Supabase client config is missing.", "error");
          return;
        }

        const params = readAuthParams();
        if (!params.access_token || !params.refresh_token) {
          setStatus("This invite or reset link is invalid or has already been used.", "error");
          return;
        }

        const supabase = window.supabase.createClient(config.url, config.anonKey);
        const { error } = await supabase.auth.setSession({
          access_token: params.access_token,
          refresh_token: params.refresh_token,
        });

        if (error) {
          setStatus(error.message || "Unable to validate this link.", "error");
          return;
        }

        form.hidden = false;
        if (params.type === "invite") {
          setStatus("Invite accepted. Choose a password to activate your account.");
        } else {
          setStatus("Choose a new password for your account.");
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          const password = passwordEl.value;
          const confirmPassword = confirmPasswordEl.value;

          if (password.length < 8) {
            setStatus("Password must be at least 8 characters.", "error");
            return;
          }

          if (password !== confirmPassword) {
            setStatus("Passwords do not match.", "error");
            return;
          }

          setStatus("Saving your password...");
          const { error: updateError } = await supabase.auth.updateUser({ password });

          if (updateError) {
            setStatus(updateError.message || "Unable to save password.", "error");
            return;
          }

          setStatus("Password saved. You can log in now.", "success");
          form.hidden = true;
          window.setTimeout(() => {
            window.location.href = "/portal";
          }, 1200);
        });
      }

      init();
    </script>
  </body>
</html>
