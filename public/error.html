<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Access Error</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Manrope", "sans-serif"],
              display: ["Fraunces", "serif"],
            },
            boxShadow: {
              soft: "0 20px 50px rgba(73, 49, 31, 0.12)",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-[linear-gradient(180deg,#f8f2eb_0%,#efe4d9_100%)] font-sans text-[#2d2623]">
    <div class="pointer-events-none fixed inset-0 overflow-hidden">
      <div class="absolute left-[-120px] top-[-80px] h-[360px] w-[360px] rounded-full bg-[#f7dcc5]/70 blur-3xl"></div>
      <div class="absolute bottom-[-120px] right-[-80px] h-[360px] w-[360px] rounded-full bg-[#ead0bc]/70 blur-3xl"></div>
    </div>

    <main class="relative mx-auto flex min-h-screen w-full max-w-6xl items-center px-6 py-10 lg:px-10">
      <div class="grid w-full gap-8 lg:grid-cols-[1.02fr_0.98fr] lg:items-center">
        <section class="max-w-2xl">
          <p class="text-[11px] font-semibold uppercase tracking-[0.28em] text-[#9c7355]">Access Error</p>
          <h1 class="mt-4 font-display text-4xl leading-tight text-[#241c18] sm:text-5xl">
            Something interrupted the sign-in flow.
          </h1>
          <p class="mt-5 max-w-xl text-base leading-7 text-[#6d584b] sm:text-lg">
            The request could not be completed as expected. Review the message on the right, then head
            back to the portal and try again.
          </p>
        </section>

        <section class="rounded-[34px] border border-white/75 bg-white/82 p-6 shadow-soft backdrop-blur sm:p-8">
          <div class="rounded-[26px] border border-[#f0d8cf] bg-[#fff6f2] p-5">
            <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-[#b85b1b]">Request Error</p>
            <h2 class="mt-3 text-3xl font-semibold text-[#241c18]">We could not finish that step</h2>
            <p id="message" class="mt-3 rounded-2xl border border-[#efd4c5] bg-white/80 px-4 py-4 text-sm leading-6 text-[#7b4f33]">
              Unknown error
            </p>
          </div>

          <div class="mt-6 space-y-3 text-sm">
            <a
              href="/portal"
              class="inline-flex h-12 w-full items-center justify-center rounded-2xl bg-[#232323] px-6 text-sm font-semibold uppercase tracking-[0.16em] text-white shadow-lg shadow-[#232323]/15 transition-all hover:-translate-y-0.5 hover:bg-[#E78B4B] active:translate-y-0"
            >
              Back to Sign In
            </a>
            <a
              href="/"
              class="inline-flex h-12 w-full items-center justify-center rounded-2xl border border-[#d8c7b8] bg-white px-6 text-sm font-semibold uppercase tracking-[0.16em] text-[#6d584b] shadow-sm transition hover:border-[#E78B4B] hover:text-[#241c18]"
            >
              View Live Inventory
            </a>
          </div>
        </section>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      document.getElementById("message").textContent = params.get("msg") || "Unknown error";
    </script>
  </body>
</html>
