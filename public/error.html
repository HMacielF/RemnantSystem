<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        background: white;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        width: min(520px, calc(100vw - 32px));
      }
      a {
        color: #b85b1b;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Something went wrong</h1>
      <p id="message"></p>
      <p><a href="/portal">Back to sign in</a></p>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      document.getElementById("message").textContent = params.get("msg") || "Unknown error";
    </script>
  </body>
</html>
