<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Access</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        color: #222;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 560px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 24px;
      }
      .muted {
        color: #666;
        font-size: 14px;
        line-height: 1.5;
      }
      h1, h2 {
        margin-top: 0;
      }
      form {
        display: grid;
        gap: 12px;
      }
      input, button {
        padding: 12px 14px;
        font-size: 16px;
        border-radius: 10px;
      }
      input {
        border: 1px solid #ccc;
      }
      button {
        border: none;
        background: #e78b4b;
        color: #fff;
        cursor: pointer;
      }
      a {
        color: #b85b1b;
      }
      .secondary {
        background: #fff;
        color: #b85b1b;
        border: 1px solid #e1b08b;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Quick Countertop</h1>
        <p class="muted">Sign in to access the management workspace.</p>
        <p><a href="/">Back to remnant viewer</a></p>
        <section>
          <h2>Log In</h2>
          <form method="POST" action="/login">
            <input type="email" name="email" placeholder="Email" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Log In</button>
          </form>
          <p><a href="/forgot-password">Forgot your password?</a></p>
        </section>
      </div>
    </div>
  </body>
</html>
